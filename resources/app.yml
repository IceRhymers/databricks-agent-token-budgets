resources:
  apps:
    usage_limits:
      name: "usage-limits"
      description: >
        Tracks Claude Code token usage per user, enforces daily/weekly/monthly
        budgets, and provides a Streamlit dashboard for monitoring.
      source_code_path: ../app

      resources:
        - name: "sql-warehouse"
          description: "SQL warehouse for querying system tables"
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: "CAN_USE"

        - name: "usage-limits-db"
          description: "Lakebase PostgreSQL database for app state"
          database:
            database_name: "databricks_postgres"
            instance_name: ${resources.database_instances.usage_limits_instance.name}
            permission: "CAN_CONNECT_AND_CREATE"

      permissions:
        - level: CAN_USE
          group_name: users
        - level: CAN_MANAGE
          user_name: ${var.admin_user}
