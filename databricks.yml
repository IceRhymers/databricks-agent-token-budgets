bundle:
  name: usage-limits

include:
  - resources/*.yml

variables:
  sql_warehouse_id:
    description: "SQL warehouse ID for querying system tables"
    default: ${resources.sql_warehouses.usage_limits_warehouse.id}
  admin_user:
    description: "Admin user email for CAN_MANAGE permission"
    default: ${workspace.current_user.userName}
  otel_catalog:
    description: "Unity Catalog catalog for OTEL metrics table"
    default: "main"
  otel_schema:
    description: "Unity Catalog schema for OTEL metrics table"
    default: "default"
  lakebase_catalog_name:
    description: "UC catalog name exposing the Lakebase database for SQL access"
    default: "usage_limits"

targets:
  dev:
    mode: development
    default: true
  prod:
    mode: production
