bundle:
  name: usage-limits

include:
  - resources/*.yml

variables:
  sql_warehouse_id:
    description: "SQL warehouse ID for querying system tables"
    lookup:
      warehouse: "Serverless Starter Warehouse"
  admin_user:
    description: "Admin user email for CAN_MANAGE permission"
    default: ${workspace.current_user.userName}
  inference_table:
    description: "Fully-qualified inference table name (catalog.schema.endpoint_payload)"
  summary_model:
    description: "Model serving endpoint name used for ai_query() summaries and classification"
    default: "databricks-meta-llama-3-3-70b-instruct"

targets:
  dev:
    mode: development
    default: true
  prod:
    mode: production
