bundle:
  name: usage-limits

include:
  - resources/*.yml

variables:
  sql_warehouse_id:
    description: "SQL warehouse ID for querying system tables"
    default: ${resources.sql_warehouses.usage_limits_warehouse.id}
  admin_user:
    description: "Admin user email for CAN_MANAGE permission"
    default: ${workspace.current_user.userName}

targets:
  dev:
    mode: development
    default: true
  prod:
    mode: production
